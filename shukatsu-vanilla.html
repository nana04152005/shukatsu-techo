<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>就活手帳</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" />
<style>
:root {
  --paper: #F2F4F1;
  --paperRaised: #FFFFFF;
  --ink: #20242B;
  --inkSoft: #5A5F6B;
  --hairline: #DCDFD8;
  --indigo: #3E4C8A;
  --indigoSoft: #E7EAF5;
  --coral: #D97A52;
  --coralSoft: #F7E6DC;
  --sage: #5C8A66;
  --sageSoft: #E4EEE3;
  --amber: #C99A3E;
  --amberSoft: #F5EBD5;
  --mute: #9A968D;
  --muteSoft: #EBEAE5;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  overscroll-behavior-y: none;
}
h1, h2, .serif { font-family: 'Shippori Mincho', serif; }
button, input, textarea, select { font-family: inherit; }
button { cursor: pointer; background: none; border: none; }
input, textarea, select { outline: none; }
a { color: inherit; }
img { max-width: 100%; display: block; }

.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 90px; }

/* layout helpers */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.items-stretch { align-items: stretch; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.flex-1 { flex: 1 1 0%; min-width: 0; }
.flex-wrap { flex-wrap: wrap; }
.shrink-0 { flex-shrink: 0; }
.gap-1 { gap: 4px; } .gap-1-5 { gap: 6px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; }
.w-full { width: 100%; }
.hidden { display: none !important; }
.text-center { text-align: center; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.relative { position: relative; }

/* spacing */
.mb-1 { margin-bottom: 4px; } .mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; } .mb-5 { margin-bottom: 20px; } .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; }
.p-3 { padding: 12px; } .p-4 { padding: 16px; } .p-5 { padding: 20px; }
.px-2 { padding-left: 8px; padding-right: 8px; }
.px-3 { padding-left: 12px; padding-right: 12px; }
.px-4 { padding-left: 16px; padding-right: 16px; }
.py-1 { padding-top: 4px; padding-bottom: 4px; }
.py-1-5 { padding-top: 6px; padding-bottom: 6px; }
.py-2 { padding-top: 8px; padding-bottom: 8px; }
.py-2-5 { padding-top: 10px; padding-bottom: 10px; }

/* text */
.t-9 { font-size: 9px; } .t-11 { font-size: 11px; } .t-12 { font-size: 12px; }
.t-13 { font-size: 13px; } .t-15 { font-size: 15px; } .t-16 { font-size: 16px; }
.t-17 { font-size: 17px; } .t-22 { font-size: 22px; }
.fw-600 { font-weight: 600; } .fw-700 { font-weight: 700; } .fw-800 { font-weight: 800; }
.c-soft { color: var(--inkSoft); } .c-mute { color: var(--mute); }
.c-indigo { color: var(--indigo); } .c-coral { color: var(--coral); } .c-sage { color: var(--sage); }

/* radius / borders */
.rounded-lg { border-radius: 10px; } .rounded-xl { border-radius: 14px; }
.rounded-2xl { border-radius: 18px; } .rounded-full { border-radius: 999px; }
.border { border: 1px solid var(--hairline); }
.bg-raised { background: var(--paperRaised); }

/* header */
.header { padding: 24px 16px 12px; background: var(--paper); }
.brand { display: flex; align-items: center; gap: 8px; }
.brand-icon {
  width: 32px; height: 32px; border-radius: 10px; background: var(--indigo);
  display: flex; align-items: center; justify-content: center;
}
.brand h1 { font-weight: 800; font-size: 22px; margin: 0; color: var(--ink); }
.subtitle { font-size: 12px; color: var(--inkSoft); margin: 4px 0 12px; }

/* tabs */
.tabs { display: flex; padding: 4px; border-radius: 14px; background: var(--muteSoft); margin-bottom: 16px; overflow-x: auto; }
.tab {
  flex: 1; text-align: center; font-size: 13px; padding: 6px 8px; border-radius: 10px;
  color: var(--inkSoft); white-space: nowrap; transition: background .15s;
}
.tab.active { background: var(--paperRaised); color: var(--ink); font-weight: 700; box-shadow: 0 1px 2px rgba(32,36,43,0.08); }

/* stat pills */
.stats { display: flex; gap: 8px; margin-bottom: 16px; }
.stat-pill {
  flex: 1; min-width: 84px; text-align: left; padding: 8px 12px; border-radius: 14px;
  display: flex; flex-direction: column;
}
.stat-pill .label { font-size: 11px; color: var(--inkSoft); }
.stat-pill .value { font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: 20px; }
.stat-pill.active { outline: 2px solid currentColor; outline-offset: -2px; }

.banner {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 14px; margin-bottom: 16px;
}

/* search / filter */
.search-row { display: flex; gap: 8px; margin-bottom: 4px; }
.search-box {
  flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-radius: 14px; background: var(--paperRaised); border: 1px solid var(--hairline);
}
.search-box input { flex: 1; border: none; background: transparent; font-size: 13px; color: var(--ink); }
.icon-btn-add {
  width: 40px; height: 40px; border-radius: 14px; background: var(--indigo);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 8px; }
.chip {
  font-size: 12px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--hairline);
  background: transparent; color: var(--inkSoft); white-space: nowrap;
}
.chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.chip.active-indigo { background: var(--indigo); color: #fff; border-color: var(--indigo); }
.chip.active-amber { background: var(--amber); color: #fff; border-color: var(--amber); }
.star-filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding-top: 8px; }

/* stage group headers */
.stage-header { display: flex; align-items: center; gap: 8px; margin: 0 4px 8px; }
.stage-badge { font-size: 12px; padding: 2px 8px; border-radius: 6px; background: var(--indigoSoft); color: var(--indigo); font-weight: 700; }

/* company card */
.card {
  background: var(--paperRaised); border: 1px solid var(--hairline); border-radius: 18px;
  padding: 16px; margin-bottom: 10px; text-align: left; width: 100%;
  box-shadow: 0 1px 2px rgba(32,36,43,0.04);
}
.card-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.card-title { font-family: 'Shippori Mincho', serif; font-weight: 700; font-size: 15px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; white-space: nowrap; }

/* route line */
.route { display: flex; align-items: center; width: 100%; }
.route-node { display: flex; flex-direction: column; align-items: center; min-width: 34px; }
.route-dot { width: 9px; height: 9px; border-radius: 999px; border: 2px solid var(--hairline); background: #fff; flex-shrink: 0; }
.route-dot.done { background: var(--indigo); border-color: var(--indigo); }
.route-dot.current { width: 14px; height: 14px; background: var(--indigo); border-color: var(--indigo); box-shadow: 0 0 0 3px var(--indigoSoft); }
.route-dot.current.dead { background: var(--mute); }
.route-label { font-size: 9px; margin-top: 4px; color: var(--inkSoft); white-space: nowrap; }
.route-label.current { color: var(--ink); font-weight: 700; }
.route-seg { flex: 1; height: 2px; background: var(--hairline); margin-bottom: 14px; min-width: 6px; }
.route-seg.done { background: var(--indigo); }
.route.compact .route-node { min-width: 0; }
.route.compact .route-seg { margin-bottom: 0; }

/* star rating */
.stars { display: inline-flex; align-items: center; gap: 2px; }
.stars button, .stars span { line-height: 0; }

/* modal overlay */
.overlay { position: fixed; inset: 0; z-index: 40; background: rgba(32,36,43,0.4); display: flex; }
.overlay.bottom { align-items: flex-end; justify-content: center; }
.overlay.right { justify-content: flex-end; }
.sheet {
  width: 100%; background: var(--paper); border-radius: 24px 24px 0 0; padding: 20px;
  max-height: 88vh; overflow-y: auto;
}
@media (min-width: 480px) { .sheet { width: 380px; border-radius: 24px; margin: auto; } }
.panel { width: 100%; max-width: 440px; height: 100%; background: var(--paper); overflow-y: auto; }
.panel-header {
  position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--paper); border-bottom: 1px solid var(--hairline);
}
.round-btn { padding: 6px; border-radius: 999px; color: var(--inkSoft); display: flex; }

/* fields */
.field-label { font-size: 12px; font-weight: 600; color: var(--inkSoft); margin-bottom: 8px; }
.field-label.no-mb { margin-bottom: 0; }
input[type=text], input[type=email], input[type=password], input[type=date], input[type=time],
input[type=number], input[type=url], textarea, select, .fake-input {
  width: 100%; padding: 8px 12px; border-radius: 14px; background: var(--paper);
  border: 1px solid var(--hairline); font-size: 13px; color: var(--ink);
}
.bg-raised-field { background: var(--paperRaised) !important; }
textarea { resize: none; font-family: inherit; }

/* buttons */
.btn { padding: 10px; border-radius: 14px; font-size: 13px; text-align: center; }
.btn-primary { background: var(--indigo); color: #fff; }
.btn-secondary { background: var(--paperRaised); color: var(--inkSoft); border: 1px solid var(--hairline); }
.btn-danger-outline { background: var(--paperRaised); color: var(--inkSoft); border: 1px solid var(--hairline); }
.btn-full { width: 100%; }
.pill-btn { font-size: 12px; padding: 4px 10px; border-radius: 999px; }

/* photo */
.photo-box {
  width: 96px; height: 96px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
  background: var(--paper); border: 1px dashed var(--hairline); color: var(--inkSoft); overflow: hidden;
}
.photo-thumb { width: 96px; height: 96px; object-fit: cover; border-radius: 14px; border: 1px solid var(--hairline); }
.photo-remove {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 999px;
  background: var(--coral); color: #fff; display: flex; align-items: center; justify-content: center;
}
.gallery-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 14px; border: 1px solid var(--hairline); }
.gallery-add { width: 80px; height: 80px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
  background: var(--paper); border: 1px dashed var(--hairline); color: var(--inkSoft); }

/* event card in schedule list */
.event-card { background: var(--paperRaised); border: 1px solid var(--hairline); border-radius: 14px; padding: 12px; margin-bottom: 8px; }

/* calendar */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
.cal-legend { display: flex; gap: 12px; margin-bottom: 12px; padding: 0 4px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--inkSoft); }
.legend-dot { width: 6px; height: 6px; border-radius: 999px; }
.cal-grid-wrap { background: var(--paperRaised); border: 1px solid var(--hairline); border-radius: 18px; padding: 10px; margin-bottom: 16px; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
.cal-weekdays div { text-align: center; font-size: 11px; padding: 4px 0; color: var(--mute); }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 4px; }
.cal-cell { display: flex; flex-direction: column; align-items: stretch; border-radius: 8px; padding: 4px 2px 6px; cursor: pointer; }
.cal-cell.selected { background: var(--indigoSoft); }
.cal-cell.dim { opacity: 0.32; }
.cal-daynum {
  width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
  border-radius: 999px; font-size: 11px; margin-bottom: 2px; margin-left: 2px;
}
.cal-daynum.today { background: var(--indigo); color: #fff; font-weight: 700; }
.cal-daynum.selected-not-today { font-weight: 700; }
.cal-events { display: flex; flex-direction: column; gap: 2px; }
.cal-event-chip {
  text-align: left; border-radius: 4px; padding: 1px 4px; font-size: 9px; line-height: 13px;
  color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;
}
.cal-overflow { font-size: 9px; padding: 0 4px; color: var(--inkSoft); }
.day-list-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 14px; background: var(--paperRaised); border: 1px solid var(--hairline); margin-bottom: 8px; width: 100%; text-align: left; }
.day-list-thumb { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
.day-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }

/* mypage */
.mypage-card { background: var(--paperRaised); border: 1px solid var(--hairline); border-radius: 18px; padding: 16px; margin-bottom: 10px; }
.mypage-link { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--indigo); text-decoration: none; overflow: hidden; }
.mypage-id-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.mypage-id-box { flex: 1; font-size: 12px; padding: 4px 8px; border-radius: 10px; background: var(--paper); color: var(--inkSoft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-btn { font-size: 11px; padding: 4px 8px; border-radius: 10px; background: var(--indigoSoft); color: var(--indigo); flex-shrink: 0; }

/* misc */
.divider-dashed { border-top: 1px dashed var(--hairline); }
.empty-state { text-align: center; padding: 60px 0; color: var(--mute); font-size: 13px; }
.round-counter { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: 14px; background: var(--indigoSoft); margin-bottom: 8px; }
.round-counter button { width: 28px; height: 28px; border-radius: 999px; background: #fff; border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--indigo); }
.round-counter button:disabled { color: var(--mute); }
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<script>
/* ================= utilities ================= */
function uid() { return Math.random().toString(36).slice(2, 10); }
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function fmtDate(y, m, d) {
  return y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
}
function todayStr() {
  const n = new Date();
  return fmtDate(n.getFullYear(), n.getMonth(), n.getDate());
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((d - now) / 86400000);
}
function deadlineTone(days) {
  if (days === null) return "var(--mute)";
  if (days < 0) return "var(--mute)";
  if (days <= 3) return "var(--coral)";
  if (days <= 7) return "var(--amber)";
  return "var(--sage)";
}

const DEFAULT_ROUNDS = 2;
const MAX_ROUNDS = 8;

function getStages(rounds) {
  const n = rounds || DEFAULT_ROUNDS;
  const interviews = [];
  for (let i = 0; i < n; i++) {
    interviews.push({ key: "interview" + (i + 1), label: (i + 1) + "次面接", short: (i + 1) + "次" });
  }
  return [
    { key: "interested", label: "気になる", short: "検討" },
    { key: "es", label: "ES提出", short: "ES" },
    { key: "test", label: "適性検査", short: "検査" },
    ...interviews,
    { key: "final", label: "最終面接", short: "最終" },
    { key: "offer", label: "内定", short: "内定" },
  ];
}
function stageIdxIn(stages, k) { return stages.findIndex((s) => s.key === k); }
function orderValue(key) {
  if (key === "interested") return 0;
  if (key === "es") return 1;
  if (key === "test") return 2;
  if (key.indexOf("interview") === 0) return 3 + Number(key.replace("interview", "")) * 0.01;
  if (key === "final") return 100;
  if (key === "offer") return 101;
  return 50;
}
function labelForStage(key) {
  if (key === "interested") return "気になる";
  if (key === "es") return "ES提出";
  if (key === "test") return "適性検査";
  if (key === "final") return "最終面接";
  if (key === "offer") return "内定";
  if (key.indexOf("interview") === 0) return key.replace("interview", "") + "次面接";
  return key;
}

const EVENT_TYPES = [
  { v: "deadline", label: "締切", color: "var(--coral)" },
  { v: "test", label: "適性検査", color: "var(--amber)" },
  { v: "interview", label: "面接・選考", color: "var(--indigo)" },
  { v: "other", label: "説明会など", color: "var(--sage)" },
  { v: "misc", label: "その他", color: "var(--mute)" },
];
function eventTypeMeta(t) {
  return EVENT_TYPES.find((e) => e.v === t) || EVENT_TYPES[EVENT_TYPES.length - 1];
}
const TEST_KINDS = ["SPI", "玉手箱", "TG-WEB", "GAB", "CAB", "その他"];
const TEST_METHODS = ["Webテスト", "テストセンター", "ペーパーテスト", "その他"];

function eventKindLabel(ev) {
  if (ev.type !== "test") return "";
  const kind = ev.testKind === "その他" ? (ev.testKindOther || "その他") : ev.testKind;
  return kind || "";
}
function eventChipLabel(ev) {
  const kind = eventKindLabel(ev);
  if (kind) return (ev.title || "適性検査") + "(" + kind + ")";
  return ev.title || eventTypeMeta(ev.type).label;
}

/* ================= icons (inline SVG, no external lib) ================= */
function icon(name, size, color) {
  size = size || 18;
  color = color || "currentColor";
  const common = 'width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  const paths = {
    plus: '<path d="M12 5v14"/><path d="M5 12h14"/>',
    x: '<path d="M18 6 6 18"/><path d="M6 6l12 12"/>',
    trash: '<path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
    chevronLeft: '<path d="m15 18-6-6 6-6"/>',
    chevronRight: '<path d="m9 18 6-6-6-6"/>',
    externalLink: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
    search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
    star: '<path d="M12 2.5 15.1 8.8 22 9.8l-5 4.9 1.2 6.9L12 18.3 5.8 21.6 7 14.7l-5-4.9 6.9-1z"/>',
    alertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    check: '<path d="M20 6 9 17l-5-5"/>',
    building: '<path d="M6 22V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v18"/><path d="M14 9h4a1 1 0 0 1 1 1v12"/><path d="M2 22h20"/>',
  };
  return '<svg ' + common + '>' + (paths[name] || "") + '</svg>';
}
function starSvg(filled, size) {
  size = size || 14;
  const fill = filled ? "var(--amber)" : "none";
  const stroke = filled ? "var(--amber)" : "var(--hairline)";
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 15.1 8.8 22 9.8l-5 4.9 1.2 6.9L12 18.3 5.8 21.6 7 14.7l-5-4.9 6.9-1z"/></svg>';
}

/* ================= image compression ================= */
function readImageCompressed(file, maxDim, quality) {
  maxDim = maxDim || 900; quality = quality || 0.68;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let width = img.width, height = img.height;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
          else { width = Math.round((width * maxDim) / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("image load failed"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("file read failed"));
    reader.readAsDataURL(file);
  });
}

/* ================= sample data ================= */
function sampleData() {

function loadState() {
  try {
    const c = localStorage.getItem("shukatsu_companies");
    state.companies = c ? JSON.parse(c) : sampleData();
  } catch (e) { state.companies = sampleData(); }
  try {
    const g = localStorage.getItem("shukatsu_generalEvents");
    state.generalEvents = g ? JSON.parse(g) : sampleGeneralEvents();
  } catch (e) { state.generalEvents = sampleGeneralEvents(); }
  try {
    const h = localStorage.getItem("shukatsu_industryHistory");
    state.industryHistory = h ? JSON.parse(h) : [];
  } catch (e) { state.industryHistory = []; }
  state.companies.forEach((c) => {
    if (!c.events) c.events = [];
    if (!c.es) c.es = [];
    if (!c.photos) c.photos = [];
    if (!c.interviewRounds) c.interviewRounds = DEFAULT_ROUNDS;
    if (c.mypageUrl === undefined) c.mypageUrl = "";
    if (c.mypageId === undefined) c.mypageId = "";
    if (c.mypageNote === undefined) c.mypageNote = "";
  });
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem("shukatsu_companies", JSON.stringify(state.companies));
      localStorage.setItem("shukatsu_generalEvents", JSON.stringify(state.generalEvents));
      localStorage.setItem("shukatsu_industryHistory", JSON.stringify(state.industryHistory));
    } catch (e) { /* ignore quota errors */ }
  }, 250);
}
function recordIndustry(name) {

/* ================= route line ================= */
function renderRoute(stage, status, rounds, compact) {
  const stages = getStages(rounds);
  const idx = stageIdxIn(stages, stage);
  const dead = status === "rejected" || status === "withdrawn";
  let html = '<div class="route' + (compact ? " compact" : "") + '" style="opacity:' + (dead ? 0.45 : 1) + '">';
  stages.forEach((s, i) => {
    const done = i < idx || (i === idx && !dead);
    const current = i === idx;
    html += '<div class="route-node" style="flex:1 1 0%">';
    html += '<div class="route-dot' + (done ? " done" : "") + (current ? " current" : "") + (current && dead ? " dead" : "") + '"></div>';
    if (!compact) html += '<div class="route-label' + (current ? " current" : "") + '">' + s.short + '</div>';
    html += '</div>';
    if (i < stages.length - 1) {
      html += '<div class="route-seg' + (i < idx ? " done" : "") + '"></div>';
    }
  });
  html += '</div>';
  return html;
}

/* ================= star rating ================= */
function renderStars(value, size, readOnly, onClickPrefix) {
  size = size || 14;
  let html = '<div class="stars">';
  for (let n = 1; n <= 5; n++) {
    const filled = n <= (value || 0);
    if (readOnly) {
      html += '<span>' + starSvg(filled, size) + '</span>';
    } else {
      html += '<button type="button" onclick="' + onClickPrefix + '(' + n + ')">' + starSvg(filled, size) + '</button>';
    }
  }
  html += '</div>';
  return html;
}

/* ================= header / stats / filters ================= */
function computeStats() {
  const active = state.companies.filter((c) => c.status === "active");
  const offer = state.companies.filter((c) => c.stage === "offer" && c.status === "active").length;
  const upcoming = state.companies
    .filter((c) => c.status === "active" && c.deadline)
    .map((c) => ({ c: c, d: daysUntil(c.deadline) }))
    .filter((x) => x.d !== null && x.d >= 0)
    .sort((a, b) => a.d - b.d);
  return { total: state.companies.length, active: active.length, offer: offer, nearest: upcoming[0] };
}

function renderCompanyCard(c) {
  const days = daysUntil(c.deadline);

    badge = '<span class="badge" style="background:var(--muteSoft);color:var(--inkSoft)">' + (c.status === "rejected" ? "不採用" : "辞退") + '</span>';

    badge = '<span class="badge" style="background:color-mix(in srgb, ' + tone + ' 15%, transparent);color:' + tone + '">' + label + '</span>';

  let html = '<button class="card" onclick="openDetail(\'' + c.id + '\')">';

function renderListView() {
  let list = state.companies.slice();
  if (state.filter === "active") list = list.filter((c) => c.status === "active");
  if (state.filter === "done") list = list.filter((c) => c.status !== "active");
  if (state.filter === "offer") list = list.filter((c) => c.stage === "offer" && c.status === "active");
  if (state.filter === "interested") list = list.filter((c) => c.stage === "interested");
  if (state.filter === "es") list = list.filter((c) => c.stage === "es");
  if (state.filter === "test") list = list.filter((c) => c.stage === "test");
  if (state.filter === "interview") list = list.filter((c) => c.stage.indexOf("interview") === 0 || c.stage === "final");
  if (state.starFilter > 0) list = list.filter((c) => (c.priority || 0) === state.starFilter);
  if (state.query.trim()) {
    const q = state.query.trim().toLowerCase();
    list = list.filter((c) => c.name.toLowerCase().indexOf(q) !== -1 || (c.industry || "").toLowerCase().indexOf(q) !== -1);
  }

  let html = '<div class="p-4" style="padding-bottom:24px">';
  if (list.length === 0) {
    html += '<div class="empty-state">' + (state.companies.length === 0 ? "まだ企業が登録されていません" : "該当する企業がありません");
    if (state.companies.length === 0) {
      html += '<div><button class="chip active-indigo" style="margin-top:12px" onclick="openAddModal()">最初の企業を追加する</button></div>';
    }
    html += '</div>';
  } else {
    const keys = Array.from(new Set(list.map((c) => c.stage))).sort((a, b) => orderValue(a) - orderValue(b));
    keys.forEach((key) => {
      const items = list.filter((c) => c.stage === key);
      if (items.length === 0) return;
      html += '<div class="mb-5"><div class="stage-header"><span class="stage-badge">' + labelForStage(key) + '</span><span class="t-11 c-mute">' + items.length + '社</span></div>';
      items.forEach((c) => { html += renderCompanyCard(c); });
      html += '</div>';
    });
  }
  html += '</div>';
  return html;
}

    if (!ev.date) return;
    items.push({
      id: ev.id, source: "general", companyId: null, companyName: null,
      title: ev.title || eventTypeMeta(ev.type).label, date: ev.date, time: ev.time || "", endTime: ev.endTime || "",
      type: ev.type || "other", location: ev.location || "", note: ev.note || "", photo: ev.photo || null,
    });
  });
  return items;
}

function renderCalendarView() {
  const allEvents = buildCalendarEvents();
  const byDate = {};
  allEvents.forEach((e) => { (byDate[e.date] = byDate[e.date] || []).push(e); });
  Object.values(byDate).forEach((list) => list.sort((a, b) => (a.time || "").localeCompare(b.time || "")));

  const y = state.calY, m = state.calM;
  const firstOfMonth = new Date(y, m, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push({ d: daysInPrevMonth - startWeekday + 1 + i, inMonth: false, y: m === 0 ? y - 1 : y, m: m === 0 ? 11 : m - 1 });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ d: d, inMonth: true, y: y, m: m });
  while (cells.length % 7 !== 0) {
    const next = cells.length - (startWeekday + daysInMonth) + 1;
    cells.push({ d: next, inMonth: false, y: m === 11 ? y + 1 : y, m: m === 11 ? 0 : m + 1 });
  }

  const today = todayStr();
  let html = '<div class="p-4" style="padding-bottom:24px">';
  html += '<div class="cal-nav"><button class="round-btn" onclick="calGoMonth(-1)">' + icon("chevronLeft", 20) + '</button>';
  html += '<span style="font-family:\'Shippori Mincho\',serif;font-weight:700;font-size:17px">' + y + '年' + (m + 1) + '月</span>';
  html += '<button class="round-btn" onclick="calGoMonth(1)">' + icon("chevronRight", 20) + '</button></div>';

  html += '<div class="cal-legend">';
  EVENT_TYPES.forEach((t) => { html += '<div class="legend-item"><span class="legend-dot" style="background:' + t.color + '"></span>' + t.label + '</div>'; });
  html += '</div>';

  html += '<div class="cal-grid-wrap"><div class="cal-weekdays">';
  WEEKDAYS.forEach((w, i) => { html += '<div style="color:' + (i === 0 ? "var(--coral)" : i === 6 ? "var(--indigo)" : "var(--mute)") + '">' + w + '</div>'; });
  html += '</div><div class="cal-days">';

  cells.forEach((cell) => {
    const dateStr = fmtDate(cell.y, cell.m, cell.d);
    const dayEvents = byDate[dateStr] || [];
    const isToday = dateStr === today;
    const isSelected = dateStr === state.calSelected;
    const shown = dayEvents.slice(0, 3);
    const overflow = dayEvents.length - shown.length;
    html += '<div class="cal-cell' + (isSelected ? " selected" : "") + (cell.inMonth ? "" : " dim") + '" onclick="calCellClick(\'' + dateStr + '\')">';
    html += '<span class="cal-daynum' + (isToday ? " today" : "") + (isSelected && !isToday ? " selected-not-today" : "") + '">' + cell.d + '</span>';
    html += '<div class="cal-events">';
    shown.forEach((e) => {
      const meta = eventTypeMeta(e.type);
      const label = e.companyName || e.title || meta.label;
      html += '<button class="cal-event-chip" style="background:' + meta.color + '" title="' + escapeHtml(eventChipLabel(e)) + '" onclick="event.stopPropagation();calChipClick(\'' + dateStr + '\')">' + escapeHtml(label) + '</button>';
    });
    if (overflow > 0) html += '<span class="cal-overflow">+' + overflow + '件</span>';
    html += '</div></div>';
  });
  html += '</div></div>';

  const selectedEvents = (byDate[state.calSelected] || []).slice().sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  html += '<div class="flex items-center justify-between mb-2" style="padding:0 4px">';
  html += '<span class="t-12 c-soft">' + state.calSelected.replace(/-/g, "/") + ' の予定</span>';
  html += '<button class="pill-btn flex items-center gap-1" style="background:var(--indigoSoft);color:var(--indigo)" onclick="openAddEventModal(\'' + state.calSelected + '\')">' + icon("plus", 13) + ' この日に追加</button>';
  html += '</div>';

  if (selectedEvents.length === 0) {
    html += '<p class="t-12 c-mute" style="padding:0 4px">予定はありません</p>';
  } else {
    selectedEvents.forEach((e) => {
      const meta = eventTypeMeta(e.type);
      let timeStr = e.time ? (" ・ " + e.time + (e.endTime ? "〜" + e.endTime : "")) : "";
      let testStr = (e.type === "test" && e.testMethod) ? (" ・ " + (e.testMethod === "その他" ? (e.testMethodOther || "その他") : e.testMethod)) : "";
      let locStr = e.location ? (" ・ " + escapeHtml(e.location)) : "";
      html += '<button class="day-list-item" onclick="dayListItemClick(\'' + e.source + '\',\'' + (e.source === "general" ? e.id : e.companyId) + '\')">';
      html += '<span class="day-dot" style="background:' + meta.color + '"></span>';
      if (e.photo) html += '<img src="' + e.photo + '" class="day-list-thumb"/>';
      html += '<div class="flex-1"><div class="t-13" style="font-weight:600">' + escapeHtml(eventChipLabel(e)) + '</div>';
      html += '<div class="t-11 c-soft truncate">' + escapeHtml(e.companyName || "個人の予定") + timeStr + testStr + locStr + '</div></div>';
      html += icon("chevronRight", 16, "var(--mute)");
      html += '</button>';
    });
  }
  html += '</div>';
  return html;
}

function calGoMonth(delta) {
  let ny = state.calY, nm = state.calM + delta;
  if (nm < 0) { nm = 11; ny -= 1; }
  if (nm > 11) { nm = 0; ny += 1; }
  state.calY = ny; state.calM = nm; render();
}
function calCellClick(dateStr) {
  if (state.calSelected === dateStr) {
    const events = buildCalendarEvents().filter((e) => e.date === dateStr).sort((a, b) => (a.time || "").localeCompare(b.time || ""));
    if (events.length > 0) { openEventFromCalendar(events[0]); return; }
  }
  state.calSelected = dateStr; render();
}
function calChipClick(dateStr) {
  if (state.calSelected === dateStr) {
    const events = buildCalendarEvents().filter((e) => e.date === dateStr).sort((a, b) => (a.time || "").localeCompare(b.time || ""));
    if (events.length > 0) { openEventFromCalendar(events[0]); return; }
  }
  state.calSelected = dateStr; render();
}
function openEventFromCalendar(e) {
  if (e.source === "general") openGeneralEvent(e.id); else openDetail(e.companyId);
}
function dayListItemClick(source, id) {
  if (source === "general") openGeneralEvent(id); else openDetail(id);
}
function renderMyPageView() {
  let list = state.companies.slice();
  if (state.myFilter === "active") list = list.filter((c) => c.status === "active");
  if (state.myFilter === "done") list = list.filter((c) => c.status !== "active");
  if (state.myFilter === "offer") list = list.filter((c) => c.stage === "offer" && c.status === "active");
  if (state.myFilter === "interested") list = list.filter((c) => c.stage === "interested");
  if (state.myFilter === "es") list = list.filter((c) => c.stage === "es");
  if (state.myFilter === "test") list = list.filter((c) => c.stage === "test");
  if (state.myFilter === "interview") list = list.filter((c) => c.stage.indexOf("interview") === 0 || c.stage === "final");
  if (state.myStarFilter > 0) list = list.filter((c) => (c.priority || 0) === state.myStarFilter);
  if (state.myQuery.trim()) {
    const q = state.myQuery.trim().toLowerCase();
    list = list.filter((c) => c.name.toLowerCase().indexOf(q) !== -1 || (c.industry || "").toLowerCase().indexOf(q) !== -1);
  }
  const sorted = list.slice().sort((a, b) => {
    const aSet = a.mypageUrl ? 1 : 0, bSet = b.mypageUrl ? 1 : 0;
    if (aSet !== bSet) return bSet - aSet;
    return a.name.localeCompare(b.name, "ja");
  });

  let html = '<div class="p-4" style="padding-bottom:24px">';
  html += '<p class="t-12 mb-3 c-soft" style="padding:0 4px">各社の採用マイページのURL・ログイン情報を一覧で確認できます</p>';
  html += '<div class="search-box mb-3">' + icon("search", 14, "var(--mute)") + '<input type="text" id="mypageSearchInput" placeholder="企業名・業界で検索" value="' + escapeHtml(state.myQuery) + '" oninput="onMyQueryInput(this)"/></div>';

  html += '<div class="chip-row" style="padding-top:0;margin-bottom:10px">';
  [["interested", "検討"], ["active", "選考中"], ["offer", "内定"], ["done", "不採用・辞退"], ["all", "すべて"], ["es", "ES"], ["test", "適性検査"], ["interview", "面接"]].forEach(([k, l]) => {
    html += '<button class="chip' + (state.myFilter === k ? " active" : "") + '" onclick="setMyFilter(\'' + k + '\')">' + l + '</button>';
  });
  html += '</div>';

  html += '<div class="star-filter-row mb-4"><span class="t-12 c-soft">志望度</span>';
  for (let n = 1; n <= 5; n++) {
    html += '<button class="chip' + (state.myStarFilter === n ? " active-amber" : "") + '" onclick="setMyStarFilter(' + n + ')">' + starSvg(state.myStarFilter === n, 11) + ' ' + n + '</button>';
  }
  html += '</div>';

  if (state.companies.length === 0) {
    html += '<div class="empty-state">まだ企業が登録されていません</div>';
  } else if (sorted.length === 0) {
    html += '<div class="empty-state">該当する企業がありません</div>';
  } else {
    sorted.forEach((c) => {
      const dead = c.status === "rejected" || c.status === "withdrawn";
      html += '<div class="mypage-card" style="opacity:' + (dead ? 0.55 : 1) + '">';
      html += '<button onclick="openDetail(\'' + c.id + '\')" style="text-align:left;width:100%;margin-bottom:8px"><span style="font-family:\'Shippori Mincho\',serif;font-weight:700;font-size:15px">' + escapeHtml(c.name) + '</span> <span class="t-11 c-mute">' + escapeHtml(c.industry || "") + '</span></button>';
      if (c.mypageUrl) {
        html += '<a href="' + escapeHtml(c.mypageUrl) + '" target="_blank" rel="noopener noreferrer" class="mypage-link"><span class="shrink-0">' + icon("externalLink", 12) + '</span><span class="truncate">' + escapeHtml(c.mypageUrl) + '</span></a>';
        if (c.mypageId) {
          html += '<div class="mypage-id-row"><span class="mypage-id-box">' + escapeHtml(c.mypageId) + '</span><button class="copy-btn" onclick="copyMypageId(\'' + c.id + '\')">' + (state.copiedId === c.id ? "コピー済み" : "コピー") + '</button></div>';
        }
        if (c.mypageNote) html += '<p class="t-11 c-mute mt-1">' + escapeHtml(c.mypageNote) + '</p>';
      } else {
        html += '<button class="chip" style="background:var(--muteSoft);color:var(--inkSoft)" onclick="openDetail(\'' + c.id + '\')">マイページ未登録・タップして追加</button>';
      }
      html += '</div>';
    });
  }
  html += '</div>';
  return html;
}
function onMyQueryInput(input) { state.myQuery = input.value; render(); }
function setMyFilter(k) { state.myFilter = k; render(); }
function setMyStarFilter(n) { state.myStarFilter = state.myStarFilter === n ? 0 : n; render(); }
function copyMypageId(id) {
  const c = findCompany(id); if (!c) return;
  const text = c.mypageId || "";
  const done = () => { state.copiedId = id; render(); setTimeout(() => { state.copiedId = null; render(); }, 1500); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(done);
  } else { done(); }
}
/* ================= top-level view/filter handlers ================= */
function setView(v) { state.view = v; render(); }
function setFilter(k) { state.filter = k; render(); }
function setStarFilter(n) { state.starFilter = state.starFilter === n ? 0 : n; render(); }
function statClick(which) {
  state.view = "list";
  if (which === "all") state.filter = "all";
  if (which === "active") state.filter = "active";
  if (which === "offer") state.filter = "offer";
  render();
}
function onListQueryInput(input) { state.query = input.value; render(); }

/* ================= main render with focus preservation ================= */
function render() {
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  let selStart = null, selEnd = null;
  if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
    try { selStart = active.selectionStart; selEnd = active.selectionEnd; } catch (e) {}
  }

  let html = renderHeader();
  if (state.view === "calendar") html += renderCalendarView();
  else if (state.view === "mypage") html += renderMyPageView();
  else html += renderListView();

  let modalHtml = "";
  if (state.openCompanyId) modalHtml += renderDetailModal();
  if (state.showAdd) modalHtml += renderAddModal();
  if (state.openGeneralEventId) modalHtml += renderGeneralEventModal();
  if (state.showAddEvent) modalHtml += renderAddEventModal();

  document.getElementById("app").innerHTML = html;
  document.getElementById("modalRoot").innerHTML = modalHtml;

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA")) {
      el.focus();
      if (selStart !== null) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }
}

/* ================= init ================= */
function init() {
  loadState();
  render();
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
